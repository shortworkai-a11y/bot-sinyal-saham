<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO-QUANT v16 | PREDATOR CORE</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #00ff00; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header { 
            text-align: center; 
            border: 1px solid #00ff00; 
            padding: 20px;
            margin-bottom: 20px;
            background-color: #111;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        h1 { margin: 0; letter-spacing: 5px; font-size: 24px; }
        .status-bar { font-size: 12px; margin-top: 10px; color: #888; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background-color: #111;
        }
        th, td { 
            padding: 15px; 
            border: 1px solid #222; 
            text-align: center; 
        }
        th { 
            background-color: #00ff00; 
            color: #000; 
            text-transform: uppercase;
            font-size: 13px;
        }
        .buy { color: #00ff00; font-weight: bold; text-shadow: 0 0 5px rgba(0,255,0,0.5); }
        .sell { color: #ff3333; font-weight: bold; text-shadow: 0 0 5px rgba(255,0,0,0.5); }
        .neutral { color: #ffff00; }
        
        #error-msg {
            color: #ff3333;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PRO-QUANT v16 | PREDATOR CORE</h1>
            <div class="status-bar">
                ENGINE STATUS: <span style="color:#00ff00">ACTIVE</span> | 
                LAST SYNC: <span id="sync-time">-</span>
            </div>
        </div>

        <div id="error-msg">Terdeteksi Limit Server. Mencoba menyambung kembali...</div>

        <table>
            <thead>
                <tr>
                    <th>Emiten</th>
                    <th>Harga Terakhir</th>
                    <th>Perubahan (%)</th>
                    <th>Sinyal Predator</th>
                </tr>
            </thead>
            <tbody id="signal-table">
                <tr><td colspan="4">MENGHUBUNGKAN KE SERVER...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            const tableBody = document.getElementById('signal-table');
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const response = await fetch('/api/signals');
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="color:#ff3333">Limit Yahoo Finance Tercapai. Tunggu 5 menit.</td></tr>';
                    return;
                }

                tableBody.innerHTML = '';
                data.forEach(item => {
                    const row = `<tr>
                        <td><strong>${item.ticker}</strong></td>
                        <td>Rp ${item.price}</td>
                        <td style="color: ${item.change >= 0 ? '#00ff00' : '#ff3333'}">${item.change}%</td>
                        <td class="${item.signal.toLowerCase()}">${item.signal}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });

                errorMsg.style.display = 'none';
                document.getElementById('sync-time').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Fetch error:', error);
                errorMsg.style.display = 'block';
            }
        }

        // Jalankan otomatis
        loadData();
        // Refresh tiap 60 detik
        setInterval(loadData, 60000);
    </script>
</body>
</html>
