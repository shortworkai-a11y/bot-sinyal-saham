<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANMORT SOVEREIGN | FULL DATA</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #58a6ff; --border: #30363d; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; background: #010409; }
        .tabs { display: flex; justify-content: center; background: var(--panel); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .tab { padding: 15px 25px; cursor: pointer; color: #8b949e; font-size: 13px; font-weight: bold; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: rgba(88, 166, 255, 0.05); }
        .content { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
        th { padding: 12px; background: #010409; color: #8b949e; position: sticky; top: 50px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); text-align: center; }
        .ticker { color: var(--accent); font-weight: bold; text-align: left; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; font-size: 20px; letter-spacing: 2px;">VANMORT SOVEREIGN v7.0</h1>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('big', this)">BIG CAP (>2000)</div>
        <div class="tab" onclick="switchTab('mid', this)">MID CAP (<2000)</div>
        <div class="tab" onclick="switchTab('small', this)">SMALL CAP (<300)</div>
    </div>

    <div class="content">
        <table>
            <thead>
                <tr>
                    <th style="text-align:left">Emiten</th>
                    <th>Harga</th>
                    <th>PE</th>
                    <th>PBV</th>
                    <th>ROE %</th>
                    <th>DER</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="7" style="padding:100px">Mengunduh Data Bursa Indonesia...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let dataStore = {};
        let activeCategory = 'big';

        async function fetchData() {
            try {
                const res = await fetch('/api/signals');
                dataStore = await res.json();
                render();
            } catch (e) {
                document.getElementById('table-body').innerHTML = '<tr><td colspan="7">Error: Gagal memuat data.</td></tr>';
            }
        }

        function switchTab(cat, el) {
            activeCategory = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            const tbody = document.getElementById('table-body');
            const stocks = dataStore[activeCategory] || [];
            
            if (stocks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="padding:50px">Data Kosong.</td></tr>';
                return;
            }

            tbody.innerHTML = stocks.map(s => {
                let badgeColor = '#8b949e';
                if (s.status === 'PREMIUM') badgeColor = '#3fb950';
                if (s.status === 'POTENTIAL') badgeColor = '#d29922';
                
                return `
                    <tr>
                        <td class="ticker">${s.symbol} <br><small style="color:#484f58; font-weight:normal">${s.name}</small></td>
                        <td>Rp ${s.price.toLocaleString()}</td>
                        <td>${s.pe}</td>
                        <td>${s.pbv}</td>
                        <td>${s.roe}%</td>
                        <td>${s.der}</td>
                        <td><span class="badge" style="border:1px solid ${badgeColor}; color:${badgeColor}; background:${badgeColor}1A">${s.status} (${s.score}/6)</span></td>
                    </tr>`;
            }).join('');
        }
        fetchData();
    </script>
</body>
</html>
