<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDATOR v16.6 | LIVE DASHBOARD</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #21262d; }
        th { color: #8b949e; font-size: 12px; text-transform: uppercase; }
        .strong-buy { color: #3fb950; font-weight: bold; background: rgba(63, 185, 80, 0.1); }
        .buy { color: #3fb950; }
        .strong-sell { color: #f85149; font-weight: bold; background: rgba(248, 81, 73, 0.1); }
        .sell { color: #f85149; }
        .footer { text-align: center; font-size: 11px; color: #484f58; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PREDATOR ENGINE v16.6</h1>
        <table>
            <thead>
                <tr>
                    <th>TICKER</th>
                    <th>PRICE (IDR)</th>
                    <th>CHANGE (%)</th>
                    <th>SIGNAL</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="4">SYNCING DATA FROM SECTORS.APP...</td></tr>
            </tbody>
        </table>
        <div class="footer">
            LAST SYNC: <span id="clock">-</span> | STATUS: <span style="color:#3fb950">LIVE</span>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            const tbody = document.getElementById('table-body');
            try {
                const response = await fetch('/api/signals');
                const data = await response.json();
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">Data tidak tersedia saat ini.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(item => {
                    const signalClass = item.signal.toLowerCase().replace(' ', '-');
                    const changeColor = item.change >= 0 ? '#3fb950' : '#f85149';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${item.ticker}</strong></td>
                            <td>Rp ${item.price}</td>
                            <td style="color: ${changeColor}">${item.change}%</td>
                            <td class="${signalClass}">${item.signal}</td>
                        </tr>`;
                });
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Error:", error);
                tbody.innerHTML = '<tr><td colspan="4" style="color:#f85149">Server sedang sibuk. Me-refresh...</td></tr>';
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
