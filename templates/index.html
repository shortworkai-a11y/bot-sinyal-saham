<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Dashboard v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .dataTables_wrapper { color: #ccc !important; padding: 20px; background: #111; border-radius: 12px; border: 1px solid #333; }
        table.dataTable tbody tr { background-color: #111 !important; border-bottom: 1px solid #222 !important; }
        input { background: #222 !important; color: white !important; border: 1px solid #444 !important; border-radius: 5px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold text-white tracking-tighter">VANMORT <span class="text-green-500">SOVEREIGN</span></h1>
                <p class="text-gray-500 text-sm">Real-time IDX Quantitative Scanner</p>
            </div>
            <div id="last-update" class="text-xs text-gray-600"></div>
        </div>

        <table id="stockTable" class="display w-full">
            <thead>
                <tr class="text-left text-gray-400 border-b border-gray-800">
                    <th>TICKER</th>
                    <th>PRICE</th>
                    <th>CHG %</th>
                    <th>PE</th>
                    <th>M.CAP</th>
                    <th>VOL RATIO</th>
                    <th>SIGNAL</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    
    <script>
        async function refreshData() {
            try {
                const res = await fetch('/api/signals');
                const data = await res.json();
                
                let html = '';
                data.forEach(s => {
                    const color = s.change_pct.includes('-') ? 'text-red-500' : 'text-green-500';
                    const statusClass = s.status.includes('STRONG') ? 'bg-green-900 text-green-300' : 
                                      s.status.includes('BUY') ? 'bg-blue-900 text-blue-300' : 'bg-gray-800 text-gray-400';
                    
                    html += `
                        <tr>
                            <td class="font-bold text-white">${s.ticker}</td>
                            <td>${s.price}</td>
                            <td class="${color} font-bold">${s.change_pct}</td>
                            <td>${s.pe}</td>
                            <td>${s.mcap}</td>
                            <td>${s.vol_ratio}</td>
                            <td>
                                <span class="px-3 py-1 rounded-full text-[10px] font-bold ${statusClass}">
                                    ${s.status}
                                </span>
                            </td>
                        </tr>`;
                });

                // Hancurkan tabel lama dan buat baru (agar fitur search/sort tetap jalan)
                if ($.fn.DataTable.isDataTable('#stockTable')) {
                    $('#stockTable').DataTable().destroy();
                }
                
                document.getElementById('tableBody').innerHTML = html;
                $('#stockTable').DataTable({
                    pageLength: 25,
                    order: [[6, 'desc']], // Sortir berdasarkan skor/status
                    responsive: true
                });

                document.getElementById('last-update').innerText = "Last Sync: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error("Error loading data");
            }
        }

        refreshData();
        setInterval(refreshData, 60000); // Auto refresh tiap 1 menit
    </script>
</body>
</html>
