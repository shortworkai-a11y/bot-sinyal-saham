<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>VanMort v7.0 Sovereign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-green-500 mb-6">VANMORT V7.0 SOVEREIGN</h1>
        <div class="card overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-800 text-gray-400">
                    <tr>
                        <th class="p-4">TICKER</th>
                        <th class="p-4">PRICE</th>
                        <th class="p-4">CHANGE</th>
                        <th class="p-4">P/E</th>
                        <th class="p-4">VOLUME</th>
                        <th class="p-4">STATUS</th>
                    </tr>
                </thead>
                <tbody id="content">
                    <tr><td colspan="6" class="p-4 text-center">Menarik Data Market...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('/api/signals');
            const data = await res.json();
            const container = document.getElementById('content');
            container.innerHTML = '';
            
            data.forEach(s => {
                const color = s.change.includes('-') ? 'text-red-500' : 'text-green-500';
                container.innerHTML += `
                    <tr class="border-b border-gray-800">
                        <td class="p-4 font-bold">${s.ticker}</td>
                        <td class="p-4">${s.price}</td>
                        <td class="p-4 ${color}">${s.change}</td>
                        <td class="p-4">${s.pe}</td>
                        <td class="p-4">${s.vol_status}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded text-xs ${s.status === 'STRONG BUY' ? 'bg-green-900 text-green-300' : 'bg-gray-700'}">
                                ${s.status}
                            </span>
                        </td>
                    </tr>`;
            });
        }
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
