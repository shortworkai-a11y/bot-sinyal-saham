<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PRO-QUANT v16 | PREDATOR CORE</title>
    <style>
        body { background-color: #050505; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .box { max-width: 700px; margin: auto; border: 1px solid #00ff00; padding: 20px; box-shadow: 0 0 15px #003300; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #111; padding: 15px; text-align: center; font-size: 14px; }
        th { background-color: #00ff00; color: #000; }
        .buy { color: #00ff00; font-weight: bold; }
        .sell { color: #ff0000; font-weight: bold; }
        .reconnecting { color: #ffff00; font-style: italic; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align: center; letter-spacing: 2px;">PREDATOR v16.2 BYPASS</h2>
        <table>
            <thead>
                <tr>
                    <th>STOCK</th>
                    <th>PRICE</th>
                    <th>CHG %</th>
                    <th>SIGNAL</th>
                </tr>
            </thead>
            <tbody id="data-table">
                <tr><td colspan="4">INITIALIZING SYSTEM...</td></tr>
            </tbody>
        </table>
        <p style="font-size: 10px; color: #444; margin-top: 15px;">Note: Jika status RECONNECTING, server sedang bypass limit Yahoo. Tunggu 60 detik.</p>
    </div>

    <script>
        async function fetchMarket() {
            try {
                const response = await fetch('/api/signals');
                const data = await response.json();
                const table = document.getElementById('data-table');
                table.innerHTML = '';
                
                data.forEach(item => {
                    table.innerHTML += `<tr>
                        <td>${item.ticker}</td>
                        <td>${item.price}</td>
                        <td style="color:${item.change >= 0 ? '#0ff' : '#f00'}">${item.change}%</td>
                        <td class="${item.signal.toLowerCase()}">${item.signal}</td>
                    </tr>`;
                });
            } catch (e) { console.log("Offline"); }
        }
        fetchMarket();
        setInterval(fetchMarket, 60000); // Jangan terlalu sering (1 menit sekali saja)
    </script>
</body>
</html>
