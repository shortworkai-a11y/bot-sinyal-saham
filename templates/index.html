<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PRO-QUANT v16 | PREDATOR CORE</title>
    <style>
        body { background-color: #050505; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; border: 1px solid #00ff00; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #004400; padding: 12px; }
        th { background-color: #002200; }
        .buy { color: #00ff00; font-weight: bold; }
        .sell { color: #ff0000; font-weight: bold; }
        .status { margin-top: 15px; font-size: 11px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h2>PREDATOR ENGINE v16</h2>
        <table>
            <thead>
                <tr>
                    <th>TICKER</th>
                    <th>PRICE</th>
                    <th>CHG %</th>
                    <th>SIGNAL</th>
                </tr>
            </thead>
            <tbody id="content">
                <tr><td colspan="4">CONNECTING TO DATA STREAM...</td></tr>
            </tbody>
        </table>
        <div class="status">Sistem otomatis refresh setiap 30 detik | <span id="clock"></span></div>
    </div>

    <script>
        async function update() {
            try {
                const r = await fetch('/api/signals');
                const d = await r.json();
                const b = document.getElementById('content');
                b.innerHTML = '';
                d.forEach(s => {
                    b.innerHTML += `<tr>
                        <td>${s.ticker}</td>
                        <td>${s.price}</td>
                        <td style="color:${s.change >= 0 ? '#0ff' : '#f00'}">${s.change}%</td>
                        <td class="${s.signal.toLowerCase()}">${s.signal}</td>
                    </tr>`;
                });
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            } catch (e) { document.getElementById('content').innerHTML = "<tr><td colspan='4'>SERVER OFFLINE</td></tr>"; }
        }
        update();
        setInterval(update, 30000);
    </script>
</body>
</html>
