<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN v7.0 | QUANT</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #58a6ff; --border: #30363d; }
        body { background: var(--bg); color: #c9d1d9; font-family: -apple-system, sans-serif; margin: 0; }
        .header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; background: var(--panel); }
        .tab-bar { display: flex; justify-content: center; gap: 10px; margin: 20px; }
        .tab { padding: 10px 25px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: #8b949e; font-size: 13px; font-weight: bold; }
        .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(88, 166, 255, 0.1); }
        .table-wrap { max-width: 1100px; margin: auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        th { background: #010409; padding: 15px; font-size: 11px; color: #8b949e; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; font-size: 22px; letter-spacing: 2px;">VANMORT SOVEREIGN</h1>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('big', this)">BIG CAP</div>
        <div class="tab" onclick="switchTab('mid', this)">MID CAP</div>
        <div class="tab" onclick="switchTab('small', this)">SMALL CAP</div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>TICKER</th>
                    <th>PRICE</th>
                    <th>PE</th>
                    <th>PBV</th>
                    <th>ROE</th>
                    <th>DER</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="content-table">
                <tr><td colspan="7" style="padding:50px">Scanning 800+ IDX Stocks...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let store = {};
        let activeCat = 'big';

        async function start() {
            try {
                const res = await fetch('/api/signals');
                store = await res.json();
                render();
            } catch (e) {
                document.getElementById('content-table').innerHTML = '<tr><td colspan="7">API Error. Coba refresh halaman.</td></tr>';
            }
        }

        function switchTab(cat, el) {
            activeCat = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            const tbody = document.getElementById('content-table');
            const data = store[activeCat] || [];
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="padding:50px; color:#8b949e">Tidak ada emiten yang masuk radar saat ini.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(s => {
                let color = '#8b949e';
                if (s.status === 'PREMIUM') color = '#3fb950';
                if (s.status === 'POTENTIAL') color = '#d29922';
                
                return `
                    <tr>
                        <td style="color:#58a6ff; font-weight:bold">${s.symbol}</td>
                        <td>Rp ${s.price.toLocaleString()}</td>
                        <td>${s.pe}x</td>
                        <td>${s.pbv}x</td>
                        <td>${s.roe}%</td>
                        <td>${s.der}</td>
                        <td><span class="badge" style="border:1px solid ${color}; color:${color}; background: ${color}1A">${s.status} (${s.score}/7)</span></td>
                    </tr>`;
            }).join('');
        }
        start();
    </script>
</body>
</html>
