<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO-QUANT v16 | PREDATOR CORE</title>
    <style>
        body { background-color: #0d0d0d; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; }
        table { width: 80%; margin: 20px auto; border-collapse: collapse; border: 1px solid #00ff00; }
        th, td { padding: 12px; border: 1px solid #004400; text-align: center; }
        th { background-color: #002200; }
        .buy { color: #00ff00; font-weight: bold; }
        .sell { color: #ff0000; font-weight: bold; }
        .header { margin-top: 30px; border-bottom: 2px solid #00ff00; display: inline-block; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>PRO-QUANT v16 | PREDATOR CORE</h1>
        <p>REAL-TIME MARKET INTELLIGENCE SYSTEM</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>TICKER</th>
                <th>PRICE</th>
                <th>CHANGE (%)</th>
                <th>SIGNAL</th>
            </tr>
        </thead>
        <tbody id="signal-table">
            <tr><td colspan="4">LOADING SYSTEM DATA...</td></tr>
        </tbody>
    </table>

    <script>
        async function updateSignals() {
            try {
                // Mengambil data dari endpoint API internal
                const response = await fetch('/api/signals');
                const data = await response.json();
                
                const tableBody = document.getElementById('signal-table');
                tableBody.innerHTML = '';

                data.forEach(item => {
                    const row = `<tr>
                        <td>${item.ticker}</td>
                        <td>${item.price}</td>
                        <td style="color: ${item.change >= 0 ? '#00ff00' : '#ff0000'}">${item.change}%</td>
                        <td class="${item.signal.toLowerCase()}">${item.signal}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error fetching signals:', error);
            }
        }

        // Jalankan saat load dan refresh tiap 60 detik
        updateSignals();
        setInterval(updateSignals, 60000);
    </script>
</body>
</html>
